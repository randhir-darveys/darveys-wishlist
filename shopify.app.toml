# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "441ec3b7b7de3794db1258ed7f547b92"
name = "wishlist"
application_url = "https://thee-heart-cameras-power.trycloudflare.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_customers,write_customers,read_products"

[app_proxy]
url = "/proxy/wishlist"
subpath = "wishlist"
prefix = "apps"

[auth]
redirect_urls = [ "https://thee-heart-cameras-power.trycloudflare.com/auth/callback" ]
